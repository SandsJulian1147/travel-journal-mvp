<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>回忆旅程</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18201f;
      --muted: #697473;
      --soft: #eef5f1;
      --paper: #f8faf7;
      --panel: #ffffff;
      --line: #dfe8e4;
      --brand: #0f6f68;
      --brand-2: #2f8d86;
      --sand: #f3eadc;
      --blue: #8cc5d7;
      --danger: #a33d2d;
      --shadow: 0 18px 42px rgba(24, 32, 31, 0.12);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --space: 20px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(15, 111, 104, 0.04) 1px, transparent 1px),
        linear-gradient(180deg, rgba(47, 141, 134, 0.04) 1px, transparent 1px),
        var(--paper);
      background-size: 34px 34px;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    label.action {
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    button {
      border: 0;
    }

    .mobile-prototype {
      width: 100%;
      min-height: 100dvh;
      display: grid;
      place-items: start center;
      padding: 0;
    }

    .app-shell {
      width: min(100%, 430px);
      height: 100dvh;
      background: var(--paper);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(24, 32, 31, 0.04);
    }

    .screen {
      height: 100dvh;
      padding-bottom: 92px;
      overflow: auto;
    }

    .map-hero {
      min-height: 390px;
      position: relative;
      overflow: hidden;
      padding: 30px 24px 0;
      background: #d9edf1;
    }

    .map-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(248, 250, 247, 0.72), rgba(248, 250, 247, 0.05) 42%, rgba(248, 250, 247, 0.86) 100%),
        url("assets/map-qingdao-memory.png") center / cover;
      transform: scale(1.02);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .date-line {
      color: rgba(24, 32, 31, 0.72);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
      margin-bottom: 8px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .hero-title {
      font-size: 42px;
      line-height: 1.04;
      letter-spacing: 0;
      font-weight: 900;
    }

    .hero-subtitle {
      margin-top: 12px;
      color: rgba(24, 32, 31, 0.7);
      font-size: 17px;
      line-height: 1.45;
      font-weight: 650;
    }

    .hero-actions {
      position: absolute;
      z-index: 2;
      left: var(--space);
      right: var(--space);
      bottom: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .primary,
    .secondary,
    .ghost,
    .quiet,
    .danger {
      min-height: 48px;
      border-radius: 999px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 850;
      letter-spacing: 0;
      text-decoration: none;
    }

    .primary {
      color: white;
      background: linear-gradient(180deg, var(--brand-2), var(--brand));
      box-shadow: 0 12px 28px rgba(15, 111, 104, 0.28);
    }

    .secondary {
      color: var(--brand);
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(12px);
    }

    .ghost {
      min-height: 42px;
      color: var(--brand);
      background: var(--soft);
      border: 1px solid rgba(15, 111, 104, 0.12);
    }

    .quiet {
      min-height: 40px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--line);
    }

    .danger {
      min-height: 40px;
      color: var(--danger);
      background: #fff3ee;
      border: 1px solid rgba(163, 61, 45, 0.18);
    }

    .sheet {
      margin: -18px 0 0;
      position: relative;
      z-index: 3;
      border-radius: 28px 28px 0 0;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      padding: 12px var(--space) 24px;
      min-height: 50dvh;
    }

    .grabber {
      width: 54px;
      height: 5px;
      margin: 0 auto 18px;
      border-radius: 999px;
      background: rgba(24, 32, 31, 0.18);
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin: 16px 0 12px;
    }

    .section-head h2 {
      font-size: 22px;
      line-height: 1.2;
      font-weight: 900;
    }

    .section-head p,
    .small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .memory-card {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius-lg);
      padding: 12px;
      display: grid;
      grid-template-columns: 104px 1fr;
      gap: 14px;
      text-align: left;
      color: var(--ink);
      margin-bottom: 12px;
    }

    .memory-card.active {
      border-color: rgba(15, 111, 104, 0.32);
      background: linear-gradient(180deg, #fff, #f1f8f5);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 16px;
      background: var(--soft);
    }

    .memory-card h3 {
      font-size: 20px;
      line-height: 1.2;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .quote {
      margin-top: 8px;
      color: #3f5350;
      font-size: 14px;
      line-height: 1.5;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      border-radius: 999px;
      padding: 7px 10px;
      background: var(--soft);
      color: #36544e;
      font-size: 12px;
      font-weight: 800;
    }

    .detail-hero {
      padding: 24px var(--space) 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.72), rgba(248,250,247,0.96)),
        url("assets/map-qingdao-memory.png") center / cover;
      min-height: 290px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .back,
    .round-action {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      border: 1px solid rgba(255, 255, 255, 0.75);
      font-weight: 900;
      backdrop-filter: blur(10px);
    }

    .title-block h2 {
      font-size: 32px;
      line-height: 1.1;
      font-weight: 950;
      margin-bottom: 8px;
    }

    .memory-line {
      margin-top: 14px;
      max-width: 310px;
      color: #455c58;
      font-size: 16px;
      line-height: 1.55;
      font-weight: 650;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin: 0 var(--space) 14px;
    }

    .panel.flush {
      margin-top: -56px;
      position: relative;
      z-index: 2;
      box-shadow: var(--shadow);
    }

    .trip-summary {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      align-items: center;
    }

    .summary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .route-card {
      margin: 0 var(--space) 14px;
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 14px 34px rgba(24, 32, 31, 0.08);
    }

    .route-map {
      min-height: 260px;
      position: relative;
      background: url("assets/map-qingdao-memory.png") center / cover;
    }

    .map-label {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      color: var(--ink);
      font-weight: 850;
    }

    .pin {
      position: absolute;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      overflow: hidden;
      border: 4px solid #fff;
      box-shadow: 0 8px 20px rgba(24, 32, 31, 0.18);
      background: var(--soft);
    }

    .pin img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .route-body {
      padding: 18px;
    }

    .timeline {
      position: relative;
      display: grid;
      gap: 0;
      margin-top: 14px;
    }

    .timeline-item {
      position: relative;
      display: grid;
      grid-template-columns: 34px 1fr 92px;
      gap: 10px;
      padding: 0 0 18px;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: 13px;
      top: 28px;
      bottom: -2px;
      width: 2px;
      background: rgba(15, 111, 104, 0.2);
    }

    .timeline-item:last-child::before {
      display: none;
    }

    .dot {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 2px solid var(--brand);
      color: var(--brand);
      background: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .timeline-title {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.25;
    }

    .timeline-text {
      color: var(--muted);
      margin-top: 5px;
      font-size: 14px;
      line-height: 1.5;
    }

    .timeline-photo {
      width: 92px;
      height: 68px;
      border-radius: 14px;
      object-fit: cover;
      background: var(--soft);
    }

    .reader {
      padding: 22px var(--space) 110px;
      background: #fff;
      height: 100dvh;
    }

    .diary-paper {
      margin-top: 18px;
      padding: 20px;
      border-radius: 22px;
      background: linear-gradient(180deg, #fff, #fbfaf5);
      border: 1px solid #ede6dc;
      color: #27302f;
      white-space: pre-wrap;
      line-height: 1.82;
      font-size: 15px;
    }

    .form-sheet {
      padding: 16px var(--space) 110px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    .field label {
      color: #425854;
      font-size: 13px;
      font-weight: 850;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      outline: none;
      padding: 13px 14px;
      resize: vertical;
    }

    .field textarea {
      min-height: 96px;
      line-height: 1.55;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: rgba(15, 111, 104, 0.42);
      box-shadow: 0 0 0 4px rgba(15, 111, 104, 0.1);
    }

    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hidden-file {
      position: relative;
      overflow: hidden;
    }

    .hidden-file input {
      position: absolute;
      inset: 0;
      opacity: 0;
    }

    .nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100%, 430px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 10px 14px 16px;
      background: rgba(255, 255, 255, 0.88);
      border-top: 1px solid rgba(223, 232, 228, 0.82);
      backdrop-filter: blur(16px);
      z-index: 20;
    }

    .nav button {
      min-height: 48px;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      font-size: 12px;
      font-weight: 850;
    }

    .nav button.active {
      color: white;
      background: var(--brand);
    }

    .empty {
      padding: 22px;
      border-radius: var(--radius-lg);
      background: var(--soft);
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .cloud-card {
      border: 1px solid rgba(15, 111, 104, 0.16);
      background: linear-gradient(180deg, #ffffff, #f2f8f5);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin: 0 0 16px;
    }

    .cloud-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .cloud-head h3 {
      font-size: 17px;
      line-height: 1.2;
      font-weight: 900;
    }

    .sync-badge {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(15, 111, 104, 0.1);
      color: var(--brand);
      font-size: 12px;
      font-weight: 900;
    }

    .cloud-card .field {
      margin-bottom: 10px;
    }

    .cloud-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .cloud-tools {
      margin-top: 10px;
      border-top: 1px solid rgba(15, 111, 104, 0.12);
      padding-top: 10px;
    }

    .cloud-tools summary {
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      list-style: none;
    }

    .cloud-tools summary::-webkit-details-marker {
      display: none;
    }

    @media (min-width: 760px) {
      .mobile-prototype {
        padding: 24px 0;
      }

      .app-shell {
        height: 844px;
        border-radius: 30px;
      }

      .screen {
        height: 844px;
      }

      .nav {
        position: absolute;
        left: 0;
        transform: none;
        width: 100%;
      }
    }

    @media print {
      .nav,
      .topbar,
      .hero-actions,
      .summary-actions,
      .map-hero,
      .detail-hero {
        display: none !important;
      }

      .app-shell,
      .screen,
      .reader {
        width: auto;
        min-height: auto;
        max-height: none;
        box-shadow: none;
        padding: 0;
        background: white;
      }

      .diary-paper {
        border: 0;
        padding: 0;
        font-size: 12pt;
      }
    }
  </style>
</head>
<body>
  <div class="mobile-prototype">
    <main class="app-shell" id="app"></main>
  </div>

  <script>
    const STORAGE_KEY = "travel-journal-meeting-mvp";
    const SYNC_CONFIG_KEY = `${STORAGE_KEY}-vercel-sync`;
    const LEGACY_SYNC_CONFIG_KEY = `${STORAGE_KEY}-supabase-sync`;
    const SYNC_SAVED_AT_KEY = `${STORAGE_KEY}-saved-at`;
    const ASSETS = {
      map: "assets/map-qingdao-memory.png",
      qingdao: "assets/photo-qingdao.jpg",
      kyoto: "assets/photo-kyoto.jpg",
      dali: "assets/photo-dali.jpg"
    };

    const state = {
      trips: [],
      activeTripId: "",
      view: "home",
      selectedStopId: "",
      generatedDiary: "",
      status: "",
      sync: {
        enabled: false,
        url: "",
        anonKey: "",
        inviteHash: "",
        inviteLabel: "",
        lastSyncedAt: "",
        syncing: false,
        error: ""
      }
    };

    const app = document.getElementById("app");
    let syncTimer = null;

    initialize();

    function initialize() {
      const saved = loadState();
      state.sync = { ...state.sync, ...loadSyncConfig() };
      state.trips = saved?.trips?.length ? saved.trips.map(normalizeTrip) : getDemoTrips();
      state.activeTripId = saved?.activeTripId && state.trips.some(trip => trip.id === saved.activeTripId)
        ? saved.activeTripId
        : state.trips[0].id;
      state.generatedDiary = saved?.generatedDiary || "";
      bindEvents();
      render();
      if (state.sync.enabled) syncNow("auto", { silent: true });
    }

    function bindEvents() {
      app.addEventListener("click", event => {
        const action = event.target.closest("[data-action]");
        if (!action) return;
        const trip = getActiveTrip();
        const actionName = action.dataset.action;

        if (actionName === "view") {
          state.view = action.dataset.view || "home";
          if (state.view === "node" && action.dataset.stopId) state.selectedStopId = action.dataset.stopId;
          render();
        }

        if (actionName === "select-trip") {
          state.activeTripId = action.dataset.tripId;
          state.generatedDiary = "";
          state.view = action.dataset.next || "detail";
          saveState();
          render();
        }

        if (actionName === "new-trip") createTrip();
        if (actionName === "reset-demo") resetDemo();
        if (actionName === "delete-trip") deleteActiveTrip();
        if (actionName === "add-stop") addStop();
        if (actionName === "generate") {
          state.generatedDiary = buildDiary(trip);
          state.view = "diary";
          saveState();
          render();
        }
        if (actionName === "clear-diary") {
          state.generatedDiary = "";
          state.status = "草稿已清空。";
          saveState();
          render();
        }
        if (actionName === "connect-sync") connectSync();
        if (actionName === "disconnect-sync") disconnectSync();
        if (actionName === "sync-now") syncNow("auto");
        if (actionName === "sync-push") syncNow("push");
        if (actionName === "sync-pull") syncNow("pull");
        if (actionName === "copy-diary") copyDiary();
        if (actionName === "export-markdown") exportMarkdown();
        if (actionName === "export-data") exportData();
        if (actionName === "print") printDiary();
        if (actionName === "remove-photo" && trip) {
          const stop = trip.stops.find(item => item.id === action.dataset.stopId);
          if (stop) {
            stop.photoDataUrl = "";
            stop.photoName = "";
            stop.photoGpsSource = "";
            afterTripEdit();
          }
        }
      });

      app.addEventListener("input", event => handleFieldInput(event));
      app.addEventListener("change", event => {
        handleFieldInput(event);
        const input = event.target.closest("[data-photo-input]");
        if (input && input.files?.[0]) handleStopPhoto(input.dataset.stopId, input.files[0]);
        if (event.target.id === "importDataInput") importData(event);
      });
    }

    function handleFieldInput(event) {
      const trip = getActiveTrip();
      if (!trip) return;

      if (event.target.dataset.field) {
        trip[event.target.dataset.field] = event.target.value;
        afterTripEdit(false);
      }
      if (event.target.dataset.memory) {
        trip.memory[event.target.dataset.memory] = event.target.value;
        afterTripEdit(false);
      }
      if (event.target.dataset.reflection) {
        trip.reflection[event.target.dataset.reflection] = event.target.value;
        afterTripEdit(false);
      }
      if (event.target.dataset.stopField) {
        const stop = trip.stops.find(item => item.id === event.target.dataset.stopId);
        if (stop) {
          stop[event.target.dataset.stopField] = event.target.value;
          afterTripEdit(false);
        }
      }
    }

    function afterTripEdit(shouldRender = true) {
      state.generatedDiary = "";
      saveState();
      if (shouldRender) render();
    }

    function render() {
      const trip = getActiveTrip();
      const html = {
        home: renderHome,
        detail: renderDetail,
        timeline: renderTimeline,
        node: renderNode,
        diary: renderDiary
      }[state.view]?.(trip) || renderHome(trip);

      app.innerHTML = `${html}${renderNav()}`;
    }

    function renderHome() {
      const active = getActiveTrip();
      return `
        <section class="screen">
          <div class="map-hero">
            <div class="hero-content">
              <div class="date-line">${formatDateShort(new Date())}</div>
              <h1 class="hero-title">回忆旅程</h1>
              <p class="hero-subtitle">重温走过的路，遇见当时的自己。</p>
            </div>
            <div class="hero-actions">
              <button class="primary" data-action="view" data-view="timeline">回看一段轨迹</button>
              <button class="secondary" data-action="new-trip">整理旧旅行</button>
            </div>
          </div>
          <section class="sheet">
            <div class="grabber"></div>
            ${renderCloudSyncPanel()}
            ${active ? `
              <article class="panel" style="margin:0 0 18px;">
                <div class="trip-summary">
                  <img class="thumb" src="${getTripCover(active)}" alt="${escapeAttr(active.title)}">
                  <div>
                    <h2>${escapeHtml(active.title || "未命名旅行")}</h2>
                    <p class="meta">${escapeHtml(active.destination || "未填写目的地")} · ${formatDateRange(active.startDate, active.endDate)}</p>
                    <p class="quote">${escapeHtml(getTripMemoryLine(active))}</p>
                  </div>
                </div>
                <div class="summary-actions">
                  <button class="primary" data-action="view" data-view="timeline">回看轨迹</button>
                  <button class="quiet" data-action="view" data-view="diary">读日记</button>
                </div>
              </article>
            ` : ""}
            <div class="section-head">
              <div>
                <h2>我的回忆旅程</h2>
                <p>每一段旅程，都是生活的片段。</p>
              </div>
              <span class="small">${state.trips.length} 次</span>
            </div>
            ${state.trips.map(trip => renderTripCard(trip)).join("")}

    async function handleStopPhoto(stopId, file) {
      const trip = getActiveTrip();
      const stop = trip?.stops.find(item => item.id === stopId);
      if (!stop) return;
      stop.photoName = file.name;
      stop.photoGpsSource = "";
      const gps = await readExifGps(file);
      if (gps) {
        stop.coordinate = `${gps.lat.toFixed(6)}, ${gps.lng.toFixed(6)}`;
        stop.photoGpsSource = "exif";
      }
      try {
        stop.photoDataUrl = await createPhotoThumbnail(file);
      } catch {
        stop.photoDataUrl = "";
      }
      state.status = gps ? "已读取照片定位，并更新到节点坐标。" : "照片已保存；没有读到定位时可手动补坐标。";
      afterTripEdit();
    }

    function getPhotoStatus(stop) {
      if (stop.photoDataUrl && stop.photoGpsSource === "exif") return `已从 ${stop.photoName || "照片"} 读取定位。`;
      if (stop.photoDataUrl) return `已保存 ${stop.photoName || "节点照片"}；如无定位，可手动补坐标。`;
      if (stop.coordinate) return "已填写手动坐标。";
      return "可选：上传原始 JPEG 照片时，会尝试读取 EXIF 经纬度。";
    }

    function getTripCover(trip) {
      const photoStop = trip.stops.find(stop => stop.photoDataUrl);
      if (photoStop) return photoStop.photoDataUrl;
      const text = `${trip.title} ${trip.destination}`.toLowerCase();
      if (/京都|japan|kyoto/.test(text)) return ASSETS.kyoto;
      if (/大理|洱海|dali/.test(text)) return ASSETS.dali;
      return ASSETS.qingdao;
    }

    function getStopPhoto(stop, trip) {
      if (stop?.photoDataUrl) return stop.photoDataUrl;
      const text = `${stop?.to || ""} ${stop?.place || ""} ${trip?.title || ""} ${trip?.destination || ""}`.toLowerCase();
      if (/京都|清水|鸭川|kyoto/.test(text)) return ASSETS.kyoto;
      if (/大理|洱海|dali/.test(text)) return ASSETS.dali;
      return ASSETS.qingdao;
    }

    function getTripMemoryLine(trip) {
      return trip.memory.highlight || trip.reflection.closing || trip.reason || "每一段路，都有值得重新想起的故事。";
    }

    function getRoutePoints(trip) {
      if (!trip) return [];
      return trip.stops
        .map((stop, index) => {
          const coord = parseCoordinate(stop.coordinate);
          if (!coord) return null;
          return {
            ...coord,
            index,
            stopId: stop.id,
            date: stop.date,
            name: stop.to || stop.place || stop.from || `节点 ${index + 1}`,
            transport: stop.transport || "",
            photoDataUrl: stop.photoDataUrl || ""
          };
        })
        .filter(Boolean);
    }

    function parseCoordinate(value) {
      if (!value) return null;
      const parts = String(value).trim().replace(/[，、\s]+/g, ",").split(",").map(part => Number(part));
      if (parts.length < 2 || parts.some(number => Number.isNaN(number))) return null;
      const [lat, lng] = parts;
      if (Math.abs(lat) > 90 || Math.abs(lng) > 180) return null;
      return { lat, lng };
    }

    function getRouteDistance(points) {
      if (!points || points.length < 2) return 0;
      return points.slice(1).reduce((total, point, index) => total + haversine(points[index], point), 0);
    }

    function haversine(a, b) {
      const radius = 6371;
      const toRad = degree => (degree * Math.PI) / 180;
      const dLat = toRad(b.lat - a.lat);
      const dLng = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 2 * radius * Math.asin(Math.sqrt(h));
    }

    function formatDistance(km) {
      if (!km) return "0 km";
      return km < 10 ? `${km.toFixed(1)} km` : `${Math.round(km)} km`;
    }

    function buildRouteSummary(trip) {
      const points = getRoutePoints(trip);
      if (!points.length) return "";
      const distance = getRouteDistance(points);
      const names = points.map(point => point.name).join(" → ");
      const photoCount = points.filter(point => point.photoDataUrl).length;
      const photoText = photoCount ? `，其中 ${photoCount} 个节点带照片` : "";
      return points.length > 1
        ? `已串联 ${points.length} 个地点${photoText}，约 ${formatDistance(distance)}：${names}`
        : `已记录 1 个地点${photoText}：${names}`;
    }

    function buildDiary(trip) {
      if (!trip) return "";
      const title = trip.title || `${trip.destination || "这次旅行"}复盘`;
      const opening = buildOpening(trip);
      const route = buildRouteSection(trip);
      const matters = buildMatterSection(trip);
      const memory = buildMemorySection(trip);
      const reflection = buildReflectionSection(trip);
      const closing = trip.reflection.closing || "这趟旅行最终留下来的，不只是去过的地方，而是我重新看见自己的方式。";
      return [
        `# ${title}`,
        "",
        opening,
        "",
        "## 路上的几个节点",
        "",
        route,
        "",
        "## 重要事项",
        "",
        matters,
        "",
        "## 最想保留的回忆",
        "",
        memory,
        "",
        "## 旅行后的感悟",
        "",
        reflection,
        "",
        closing
      ].filter(Boolean).join("\n");
    }

    function buildOpening(trip) {
      const time = formatDateRange(trip.startDate, trip.endDate);
      const people = trip.people ? `同行的是${trip.people}` : "同行人已经有些模糊，但当时的状态还值得重新打捞";
      const reason = trip.reason || "这次出发并不只是为了抵达某个地点，也像是在给当时的自己换一个空间。";
      const expectation = trip.expectation ? `出发前，我最期待的是：${trip.expectation}` : "出发前的期待没有被完整记录下来，但这也正是复盘要补上的部分。";
      if (trip.tone === "clean") return `这次旅行的目的地是${trip.destination || "未填写目的地"}，时间是${time}。${people}。${reason}\n\n${expectation}`;
      if (trip.tone === "story") return `现在回看${time}的${trip.destination || "那次旅行"}，它更像一段被时间折叠起来的故事。${people}。当时决定出发，是因为${reason}\n\n${expectation}`;
      return `我想把${time}的${trip.destination || "这次旅行"}重新整理一遍。${people}。当时之所以出发，是因为${reason}\n\n${expectation}`;
    }

    function buildRouteSection(trip) {
      const stops = trip.stops.filter(stop => stop.place || stop.to || stop.event || stop.feeling || stop.from || stop.transport || stop.logistics);
      if (!stops.length) return "这部分还需要补充几个关键地点。游记不需要记录每一分钟，只要把真正影响记忆的节点写出来。";
      const summary = buildRouteSummary(trip);
      const details = stops.map((stop, index) => {
        const date = stop.date ? `${formatDate(stop.date)}，` : "";
        const place = stop.to || stop.place || "一个还没命名的地点";
        const movement = buildMovementLine(stop);
        const logistics = buildLogisticsLine(stop);
        const event = stop.event || "这里发生了什么还需要继续补充。";
        const feeling = stop.feeling ? `当时的感受是：${stop.feeling}` : "当时的情绪还没有写下。";
        const marker = stop.weight === "高光" ? "高光节点" : stop.weight === "重要" ? "重要节点" : "节点";
        return [`${index + 1}. ${date}${place}（${marker}）`, movement, logistics, event, feeling].filter(Boolean).join("\n");
      }).join("\n\n");
      return [summary, details].filter(Boolean).join("\n\n");
    }

    function buildMovementLine(stop) {
      const route = stop.from || stop.to ? `${stop.from || "上一站"} -> ${stop.to || stop.place || "下一站"}` : "";
      const transport = stop.transport ? `交通方式：${stop.transport}` : "";
      return [route ? `移动路线：${route}` : "", transport].filter(Boolean).join("；");
    }

    function buildLogisticsLine(stop) {
      if (stop.logistics) return `衣食住行/花费：${stop.logistics}`;
      const items = [
        stop.outfit ? `衣/天气/体力：${stop.outfit}` : "",
        stop.food ? `食：${stop.food}` : "",
        stop.lodging ? `住：${stop.lodging}` : "",
        stop.cost ? `行/花费：${stop.cost}` : ""
      ].filter(Boolean);
      return items.length ? items.join("\n") : "";
    }

    function mergeLegacyLogistics(stop) {
      return [
        stop.outfit ? `衣/天气/体力：${stop.outfit}` : "",
        stop.food ? `食：${stop.food}` : "",
        stop.lodging ? `住：${stop.lodging}` : "",
        stop.cost ? `行/花费：${stop.cost}` : "",
        stop.logisticsNote ? `提醒：${stop.logisticsNote}` : ""
      ].filter(Boolean).join("\n");
    }

    function buildMatterSection(trip) {
      const matters = trip.matters.filter(matter => matter.title || matter.detail);
      if (!matters.length) return "暂时还没有记录跨越整趟旅行的重要事项。之后补上这些信息，会让这篇游记更像一份可以回看的旅行档案。";
      return matters.map(matter => `- ${matter.type}：${matter.title || "未命名事项"}\n  ${matter.detail || "细节待补充。"}`).join("\n");
    }

    function buildMemorySection(trip) {
      const blocks = [
        trip.memory.highlight ? `高光片段：${trip.memory.highlight}` : "",
        trip.memory.turning ? `意外或转折：${trip.memory.turning}` : "",
        trip.memory.person ? `关键人物：${trip.memory.person}` : "",
        trip.memory.sensory ? `感官记忆：${trip.memory.sensory}` : "",
        trip.memory.photoNote ? `照片素材：${trip.memory.photoNote}` : ""
      ].filter(Boolean);
      return blocks.length ? blocks.join("\n\n") : "这一部分还需要写下更具体的画面。";
    }

    function buildReflectionSection(trip) {
      const blocks = [
        trip.reflection.learned ? `这次旅行让我意识到：${trip.reflection.learned}` : "",
        trip.reflection.regret ? `遗憾或未完成：${trip.reflection.regret}` : "",
        trip.reflection.nextTime ? `下次提醒：${trip.reflection.nextTime}` : ""
      ].filter(Boolean);
      return blocks.length ? blocks.join("\n\n") : "现在还没有写下旅行后的感悟。";
    }

    function buildPreviewHint(trip) {
      return `点击“生成/刷新”，这里会生成《${trip.title || "未命名旅行"}》的游记初稿。\n\n建议先补齐：出行动机、2-3 个轨迹节点、1 个高光片段和旅行后的感悟。`;
    }

    async function copyDiary() {
      const text = state.generatedDiary || buildDiary(getActiveTrip());
      try {
        await navigator.clipboard.writeText(text);
        state.status = "已复制游记文本。";
      } catch {
        state.status = "浏览器没有开放复制权限，可以手动选中文本复制。";
      }
      render();
    }

    function exportMarkdown() {
      const trip = getActiveTrip();
      const text = state.generatedDiary || buildDiary(trip);
      downloadText(`${sanitizeFileName(trip.title || "旅行游记")}.md`, text, "text/markdown");
      state.status = "已导出游记 Markdown。";
      render();
    }

    function exportData() {
      downloadText(`旅行复盘记录-${formatExportDate(new Date())}.json`, JSON.stringify({
        version: 1,
        exportedAt: new Date().toISOString(),
        activeTripId: state.activeTripId,
        generatedDiary: state.generatedDiary,
        trips: state.trips
      }, null, 2), "application/json");
      state.status = "已导出完整备份。";
      render();
    }

    async function importData(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!Array.isArray(data.trips) || !data.trips.length) throw new Error("invalid backup");
        state.trips = data.trips.map(normalizeTrip);
        state.activeTripId = state.trips.some(trip => trip.id === data.activeTripId) ? data.activeTripId : state.trips[0].id;
        state.generatedDiary = data.generatedDiary || "";
        state.view = "home";
        state.status = `已导入 ${state.trips.length} 次旅行记录。`;
        saveState();
        render();
      } catch {
        state.status = "导入失败。请确认选择的是这个工具导出的 JSON 备份文件。";
        render();
      } finally {
        event.target.value = "";
      }
    }

    function printDiary() {
      if (!state.generatedDiary) {
        state.generatedDiary = buildDiary(getActiveTrip());
        saveState();
      }
      state.view = "diary";
      render();
      setTimeout(() => window.print(), 80);
    }

    function resetDemo() {
      state.trips = getDemoTrips();
      state.activeTripId = state.trips[0].id;
      state.view = "home";
      state.selectedStopId = "";
      state.generatedDiary = "";
      state.status = "示例已恢复。";
      saveState();
      render();
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY));
      } catch {
        return null;
      }
    }

    function saveState(options = {}) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        trips: state.trips,
        activeTripId: state.activeTripId,
        generatedDiary: state.generatedDiary
      }));
      localStorage.setItem(SYNC_SAVED_AT_KEY, new Date().toISOString());
      if (!options.skipSync) scheduleCloudSync();
    }

    function renderSaveText() {
      const savedAt = localStorage.getItem(SYNC_SAVED_AT_KEY);
      const cloudText = state.sync.enabled
        ? state.sync.lastSyncedAt
          ? `云端同步：${formatDateTime(state.sync.lastSyncedAt)}。`
          : "云端同步已开启。"
        : "内容只保存在当前浏览器。";
      return savedAt ? `已自动保存：${formatDateTime(savedAt)}。${cloudText}` : cloudText;
    }

    function loadSyncConfig() {
      try {
        return JSON.parse(localStorage.getItem(SYNC_CONFIG_KEY))
          || JSON.parse(localStorage.getItem(LEGACY_SYNC_CONFIG_KEY))
          || {};
      } catch {
        return {};
      }
    }

    function saveSyncConfig() {
      localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify({
        enabled: state.sync.enabled,
        url: state.sync.url,
        anonKey: state.sync.anonKey,
        inviteHash: state.sync.inviteHash,
        inviteLabel: state.sync.inviteLabel,
        lastSyncedAt: state.sync.lastSyncedAt
      }));
    }

    async function connectSync() {
      const inviteCode = document.getElementById("syncInviteCode")?.value.trim() || "";
      if (inviteCode.length < 6) {
        state.sync.error = "请填写至少 6 位家庭密钥。";
        render();
        return;
      }
      state.sync = {
        ...state.sync,
        enabled: true,
        inviteHash: await sha256(inviteCode),
        inviteLabel: maskInvite(inviteCode),
        error: ""
      };
      saveSyncConfig();
      await syncNow("auto");
    }

    function disconnectSync() {
      clearTimeout(syncTimer);
      syncTimer = null;
      state.sync = {
        enabled: false,
        url: "",
        anonKey: "",
        inviteHash: "",
        inviteLabel: "",
        lastSyncedAt: "",
        syncing: false,
        error: ""
      };
      localStorage.removeItem(SYNC_CONFIG_KEY);
      localStorage.removeItem(LEGACY_SYNC_CONFIG_KEY);
      state.status = "已退出家庭空间，本地数据仍保留。";
      render();
    }

    function scheduleCloudSync() {
      if (!state.sync.enabled || state.sync.syncing) return;
      clearTimeout(syncTimer);
      syncTimer = setTimeout(() => syncNow("push", { silent: true }), 1400);
    }

    async function syncNow(mode = "auto", options = {}) {
      if (!state.sync.enabled) return;
      if (!state.sync.inviteHash) {
        state.sync.error = "家庭密钥配置不完整。";
        saveSyncConfig();
        if (!options.silent) render();
        return;
      }

      state.sync.syncing = true;
      state.sync.error = "";
      if (!options.silent) render();

      try {
        const cloud = await loadCloudRecord();
        if (mode === "pull") {
          if (!cloud?.payload?.trips?.length) throw new Error("云端还没有可恢复的数据。");
          applyCloudPayload(cloud.payload);
          state.status = "已从云端恢复记录。";
        } else if (mode === "push" || !cloud?.payload?.trips?.length) {
          await saveCloudRecord();
          state.status = mode === "push" ? "已覆盖云端记录。" : "已创建云端记录。";
        } else {
          const localTime = new Date(localStorage.getItem(SYNC_SAVED_AT_KEY) || 0).getTime();
          const cloudTime = new Date(cloud.updatedAt || cloud.updated_at || cloud.payload.savedAt || 0).getTime();
          if (cloudTime > localTime + 1000) {
            applyCloudPayload(cloud.payload);
            state.status = "已同步云端较新的记录。";
          } else {
            await saveCloudRecord();
            state.status = "已把本地较新的记录同步到云端。";
          }
        }
        state.sync.lastSyncedAt = new Date().toISOString();
        saveSyncConfig();
      } catch (error) {
        state.sync.error = `云端同步失败：${error.message || "请检查 Vercel 存储配置"}`;
        saveSyncConfig();
      } finally {
        state.sync.syncing = false;
        if (!options.silent) render();
      }
    }

    async function loadCloudRecord() {
      const result = await syncApi({
        mode: "load",
        inviteHash: state.sync.inviteHash
      });
      return result.record || null;
    }

    async function saveCloudRecord() {
      const result = await syncApi({
        mode: "save",
        inviteHash: state.sync.inviteHash,
        clientId: getClientId(),
        payload: buildCloudPayload()
      });
      return result.record || null;
    }

    async function syncApi(body) {
      const response = await fetch("/api/sync", {
        method: "POST",
        headers: {
          "content-type": "application/json"
        },
        body: JSON.stringify(body)
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok || data.error) throw new Error(data.error || `HTTP ${response.status}`);
      return data;
    }

    function buildCloudPayload() {
      return {
        version: 2,
        savedAt: new Date().toISOString(),
        activeTripId: state.activeTripId,
        generatedDiary: state.generatedDiary,
        trips: state.trips
      };
    }

    function applyCloudPayload(payload) {
      state.trips = payload.trips.map(normalizeTrip);
      state.activeTripId = state.trips.some(trip => trip.id === payload.activeTripId) ? payload.activeTripId : state.trips[0].id;
      state.generatedDiary = payload.generatedDiary || "";
      saveState({ skipSync: true });
    }

    async function sha256(value) {
      const bytes = new TextEncoder().encode(value);
      const hash = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(hash)).map(byte => byte.toString(16).padStart(2, "0")).join("");
    }

    function maskInvite(value) {
      if (value.length <= 4) return "****";
      return `${value.slice(0, 2)}...${value.slice(-2)}`;
    }

    function getClientId() {
      const key = `${STORAGE_KEY}-client-id`;
      let clientId = localStorage.getItem(key);
      if (!clientId) {
        clientId = createId();
        localStorage.setItem(key, clientId);
      }
      return clientId;
    }

    function getActiveTrip() {
      return state.trips.find(trip => trip.id === state.activeTripId) || state.trips[0];
    }

    function normalizeTrip(trip) {
      return {
        id: trip.id || createId(),
        title: trip.title || "未命名旅行",
        destination: trip.destination || "",
        startDate: trip.startDate || "",
        endDate: trip.endDate || "",
        people: trip.people || "",
        tone: ["private", "story", "clean"].includes(trip.tone) ? trip.tone : "private",
        reason: trip.reason || "",
        expectation: trip.expectation || "",
        memory: { ...createBlankMemory(), ...(trip.memory || {}) },
        reflection: { ...createBlankReflection(), ...(trip.reflection || {}) },
        stops: Array.isArray(trip.stops) && trip.stops.length ? trip.stops.map(normalizeStop) : [createBlankStop()],
        matters: Array.isArray(trip.matters) && trip.matters.length ? trip.matters.map(matter => ({ ...createBlankMatter(), ...matter, id: matter.id || createId() })) : [createBlankMatter()]
      };
    }

    function normalizeStop(stop) {
      const merged = { ...createBlankStop(), ...stop, id: stop.id || createId() };
      if (!merged.to && merged.place) merged.to = merged.place;
      if (!merged.logistics) merged.logistics = mergeLegacyLogistics(merged);
      return merged;
    }

    function createPhotoThumbnail(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const image = new Image();
          image.onload = () => {
            const max = 640;
            const scale = Math.min(1, max / Math.max(image.naturalWidth, image.naturalHeight));
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
            canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));
            canvas.getContext("2d").drawImage(image, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.78));
          };
          image.onerror = reject;
          image.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function readExifGps(file) {
      if (!/^image\/(jpeg|jpg)$/.test(file.type) && !/\.jpe?g$/i.test(file.name)) return null;
      try {
        return parseExifGps(await file.arrayBuffer());
      } catch {
        return null;
      }
    }

    function parseExifGps(buffer) {
      const view = new DataView(buffer);
      if (view.byteLength < 12 || view.getUint16(0) !== 0xffd8) return null;
      let offset = 2;
      while (offset + 4 <= view.byteLength) {
        if (view.getUint8(offset) !== 0xff) { offset += 1; continue; }
        const marker = view.getUint8(offset + 1);
        if (marker === 0xda || marker === 0xd9) break;
        const size = view.getUint16(offset + 2);
        if (marker === 0xe1 && offset + 10 <= view.byteLength && readAscii(view, offset + 4, 6) === "Exif\0\0") {
          return parseExifGpsSegment(view, offset + 10);
        }
        offset += 2 + Math.max(size, 2);
      }
      return null;
    }

    function parseExifGpsSegment(view, tiffStart) {
      if (tiffStart + 8 > view.byteLength) return null;
      const little = view.getUint16(tiffStart) === 0x4949;
      if (view.getUint16(tiffStart + 2, little) !== 42) return null;
      const ifd = tiffStart + view.getUint32(tiffStart + 4, little);
      if (ifd + 2 > view.byteLength) return null;
      const count = view.getUint16(ifd, little);
      let gpsOffset = null;
      for (let index = 0; index < count; index += 1) {
        const entry = ifd + 2 + index * 12;
        if (entry + 12 > view.byteLength) break;
        if (view.getUint16(entry, little) === 0x8825) gpsOffset = readExifValue(view, entry, tiffStart, little);
      }
      if (!gpsOffset) return null;
      const gpsIfd = tiffStart + gpsOffset;
      if (gpsIfd + 2 > view.byteLength) return null;
      const gpsCount = view.getUint16(gpsIfd, little);
      const values = {};
      for (let index = 0; index < gpsCount; index += 1) {
        const entry = gpsIfd + 2 + index * 12;
        if (entry + 12 > view.byteLength) break;
        const tag = view.getUint16(entry, little);
        if ([1, 2, 3, 4].includes(tag)) values[tag] = readExifValue(view, entry, tiffStart, little);
      }
      if (!values[1] || !values[2] || !values[3] || !values[4]) return null;
      const lat = dmsToDecimal(values[2]);
      const lng = dmsToDecimal(values[4]);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
      return { lat: String(values[1]).toUpperCase().startsWith("S") ? -lat : lat, lng: String(values[3]).toUpperCase().startsWith("W") ? -lng : lng };
    }

    function readExifValue(view, entry, tiffStart, little) {
      const type = view.getUint16(entry + 2, little);
      const count = view.getUint32(entry + 4, little);
      const sizes = { 1: 1, 2: 1, 3: 2, 4: 4, 5: 8, 7: 1 };
      const size = (sizes[type] || 0) * count;
      if (!size) return null;
      const dataOffset = size <= 4 ? entry + 8 : tiffStart + view.getUint32(entry + 8, little);
      if (dataOffset + size > view.byteLength) return null;
      if (type === 2) return readAscii(view, dataOffset, count).replace(/\0/g, "").trim();
      if (type === 3) return count === 1 ? view.getUint16(dataOffset, little) : Array.from({ length: count }, (_, i) => view.getUint16(dataOffset + i * 2, little));
      if (type === 4) return count === 1 ? view.getUint32(dataOffset, little) : Array.from({ length: count }, (_, i) => view.getUint32(dataOffset + i * 4, little));
      if (type === 5) return Array.from({ length: count }, (_, i) => {
        const denominator = view.getUint32(dataOffset + i * 8 + 4, little);
        return denominator ? view.getUint32(dataOffset + i * 8, little) / denominator : NaN;
      });
      return null;
    }

    function readAscii(view, offset, length) {
      let text = "";
      for (let index = 0; index < length && offset + index < view.byteLength; index += 1) text += String.fromCharCode(view.getUint8(offset + index));
      return text;
    }

    function dmsToDecimal(value) {
      return Array.isArray(value) && value.length >= 3 ? value[0] + value[1] / 60 + value[2] / 3600 : NaN;
    }

    function downloadText(filename, text, type) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function formatDateRange(start, end) {
      if (start && end) return `${formatDate(start)} - ${formatDate(end)}`;
      if (start) return `${formatDate(start)}起`;
      if (end) return `${formatDate(end)}前`;
      return "未填写日期";
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function formatTimeHint(value) {
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function formatDateShort(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function formatDateTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function formatExportDate(date) {
      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}-${pad(date.getHours())}${pad(date.getMinutes())}`;
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function createId() {
      return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function sanitizeFileName(value) {
      return value.replace(/[\\/:*?"<>|]/g, "_").trim() || "旅行游记";
    }

    function escapeHtml(value = "") {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value = "") {
      return escapeHtml(value).replace(/\n/g, " ");
    }
  </script>
</body>
